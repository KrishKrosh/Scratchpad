name: Build and Release Scratchpad

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Scratchpad
  SCHEME: Scratchpad
  CONFIGURATION: Release
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify LFS assets
        run: git lfs pull

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        uses: Apple-Actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Compute next release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')
          if [[ -z "$LATEST_TAG" ]]; then
            VERSION="1.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/ci/build_release.sh
          ./scripts/ci/build_release.sh

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"
          cat > "$RELEASE_NOTES" <<EOF
          ## Scratchpad $VERSION

          Built automatically from \`main\`.
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$RUNNER_TEMP/release-assets/"* --clobber
          else
            gh release create "$TAG" "$RUNNER_TEMP/release-assets/"* \
              --title "$TAG" \
              --notes-file "$RELEASE_NOTES" \
              --latest
          fi
